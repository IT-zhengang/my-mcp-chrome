name: Build and Release Chrome Extension

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/build-release.yml
      - app/chrome-extension/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/build-release.yml
      - app/chrome-extension/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chrome-extension-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-extension:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare workspace packages
        run: |
          pnpm --filter chrome-mcp-shared build
          pnpm --filter chrome-mcp-server run postinstall

      - name: Build extension package
        run: pnpm --filter chrome-mcp-server build

      - name: Prepare release files
        id: release_files
        run: |
          set -euo pipefail

          BUILD_DIR="app/chrome-extension/.output/chrome-mv3"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "Build output directory not found: $BUILD_DIR"
            exit 1
          fi

          LASTEST_DIR="releases/chrome-extension/lastest"
          PACKAGE_NAME="chrome-mcp-server-lastest.zip"
          OUTPUT_ZIP="$GITHUB_WORKSPACE/$LASTEST_DIR/$PACKAGE_NAME"

          mkdir -p "$LASTEST_DIR"
          rm -rf "$LASTEST_DIR"/*

          (
            cd "$BUILD_DIR"
            zip -qr "$OUTPUT_ZIP" .
          )

          echo "artifact_dir=$LASTEST_DIR" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_files.outputs.artifact_name }}
          path: ${{ steps.release_files.outputs.artifact_dir }}
          retention-days: 30

      - name: Commit and push releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add releases/chrome-extension

          if git diff --cached --quiet; then
            echo "No release artifacts changed."
            exit 0
          fi

          git commit -m "chore: update chrome extension release [skip ci]"
          git push origin HEAD:master

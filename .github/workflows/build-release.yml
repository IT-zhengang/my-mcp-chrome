name: Build and Release Chrome Extension

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/build-release.yml
      - app/chrome-extension/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/build-release.yml
      - app/chrome-extension/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chrome-extension-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-extension:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare workspace packages
        run: |
          pnpm --filter chrome-mcp-shared build
          pnpm --filter chrome-mcp-server run postinstall

      - name: Build extension package
        run: pnpm --filter chrome-mcp-server build

      - name: Verify copied inject scripts
        run: |
          set -euo pipefail

          SRC_DIR="app/chrome-extension/inject-scripts"
          OUT_DIR="app/chrome-extension/.output/chrome-mv3/inject-scripts"

          if [ ! -d "$OUT_DIR" ]; then
            echo "Inject script output directory not found: $OUT_DIR"
            exit 1
          fi

          missing=0
          for src in "$SRC_DIR"/*.js; do
            file="$(basename "$src")"
            if [ ! -f "$OUT_DIR/$file" ]; then
              echo "Missing inject script in build output: $file"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare release files
        id: release_files
        run: |
          set -euo pipefail

          BUILD_DIR="app/chrome-extension/.output/chrome-mv3"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "Build output directory not found: $BUILD_DIR"
            exit 1
          fi

          LATEST_DIR="releases/chrome-extension/latest"
          PACKAGE_NAME="chrome-mcp-server-latest.zip"
          OUTPUT_ZIP="$GITHUB_WORKSPACE/$LATEST_DIR/$PACKAGE_NAME"

          mkdir -p "$LATEST_DIR"
          rm -f "$OUTPUT_ZIP"

          (
            cd "$BUILD_DIR"
            zip -qr "$OUTPUT_ZIP" .
          )

          echo "artifact_path=$OUTPUT_ZIP" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_files.outputs.artifact_name }}
          path: ${{ steps.release_files.outputs.artifact_path }}
          retention-days: 30

      - name: Commit and push releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add releases/chrome-extension/latest

          if git diff --cached --quiet; then
            echo "No release artifacts changed."
            exit 0
          fi

          git commit -m "chore: update chrome extension release [skip ci]"
          git push origin HEAD:master

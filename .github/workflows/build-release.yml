name: Build and Release Chrome Extension

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-release.yml
      - app/chrome-extension/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/build-release.yml
      - app/chrome-extension/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chrome-extension-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-extension:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build zip package
        run: pnpm --filter chrome-mcp-server zip

      - name: Prepare release files
        id: release_files
        run: |
          set -euo pipefail

          ZIP_FILE="$(find app/chrome-extension/.output -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip artifact was generated under app/chrome-extension/.output"
            exit 1
          fi

          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          LATEST_DIR="releases/chrome-extension/latest"
          VERSION_DIR="releases/chrome-extension/${TIMESTAMP}"

          mkdir -p "$LATEST_DIR" "$VERSION_DIR"
          rm -f "$LATEST_DIR"/*.zip

          cp "$ZIP_FILE" "$LATEST_DIR/${REPO_NAME}-latest.zip"
          cp "$ZIP_FILE" "$VERSION_DIR/${REPO_NAME}-${TIMESTAMP}.zip"

          echo "artifact_dir=releases/chrome-extension" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-build-${{ steps.release_files.outputs.timestamp }}
          path: ${{ steps.release_files.outputs.artifact_dir }}
          retention-days: 30

      - name: Commit and push releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add releases/chrome-extension

          if git diff --cached --quiet; then
            echo "No release artifacts changed."
            exit 0
          fi

          git commit -m "chore: update chrome extension release [skip ci]"
          git push origin HEAD:main
